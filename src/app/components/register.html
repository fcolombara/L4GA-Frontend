<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 15px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">L4GA</h2>
      <p class="text-muted">Crear nueva cuenta</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary">Nombre Completo</label>
        <input type="text" name="nombre" [(ngModel)]="registerData.nombre" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary">Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="registerData.email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary">Contraseña</label>
        <input type="password" name="password" [(ngModel)]="registerData.passwordHash" class="form-control" required>
      </div>

      <div class="alert alert-info py-2 small">
        Tu cuenta será creada con nivel de acceso: <strong>Visor</strong>.
      </div>

      <button type="submit" class="btn btn-success w-100 py-2 fw-bold mb-3">
        Registrarse
      </button>

      <div class="text-center">
        <a routerLink="/login" class="text-decoration-none small">¿Ya tienes cuenta? Inicia sesión</a>
      </div>
    </form>
  </div>
</div>
